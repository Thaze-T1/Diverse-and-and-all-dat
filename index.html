<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOBBY | v5.2</title>
    <style>
        :root { --bg: #050505; --card: #111; --accent: #00ff41; --vid-blue: #00d4ff; --text: #ddd; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        .search-area { background: var(--card); padding: 20px; border: 2px solid #333; border-radius: 8px; margin-bottom: 20px; }
        #extract-btn { background: var(--accent); color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; display: none; margin-top: 10px; }

        #results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        
        /* THE BLUE LINE LOGIC */
        .media-card { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; cursor: pointer; transition: 0.3s; padding: 5px; }
        .is-video { border: 3px solid var(--vid-blue) !important; box-shadow: 0 0 15px var(--vid-blue); }

        .preview-box { width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; border-radius: 4px; }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }

        /* POPUP */
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; }
        .lightbox-content { width: 90%; height: 85%; background: #000; border: 2px solid var(--accent); position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: white; }
        .close-btn { position: absolute; top: -40px; right: 0; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color:var(--accent);">THE LOBBY v5.2</h1>
    
    <div class="search-area">
        <script async src="https://cse.google.com/cse.js?cx=25f8990bec5e845a4"></script>
        <div class="gcse-search"></div>
        <button id="extract-btn" onclick="runExtraction()">⚡ EXECUTE GLOBAL SCAN</button>
    </div>

    <div id="results-grid"></div>
</div>

<div id="lightbox" onclick="this.style.display='none'">
    <div class="lightbox-content" id="viewer" onclick="event.stopPropagation()">
        <div class="close-btn">CLOSE [X]</div>
    </div>
</div>

<script>
function runExtraction() {
    console.log("Scanner Initialized...");
    const googleItems = document.querySelectorAll('.gsc-result');
    const grid = document.getElementById('results-grid');
    
    if (googleItems.length === 0) {
        alert("No targets found in current perimeter. Try searching first.");
        return;
    }

    grid.innerHTML = ''; // Clear Lobby

    googleItems.forEach(item => {
        const anchor = item.querySelector('a.gs-title');
        if (!anchor) return;

        const title = anchor.innerText;
        const url = anchor.href;
        const imgObj = item.querySelector('img.gs-image');
        const thumb = imgObj ? imgObj.src : 'https://via.placeholder.com/300x160?text=NO+DATA';
        
        // BETTER VIDEO DETECTION
        const check = url.toLowerCase();
        const isVid = check.includes('video') || check.includes('watch') || check.includes('youtube') || check.includes('mugen') || check.includes('clip');
        
        const card = document.createElement('div');
        card.className = `media-card ${isVid ? 'is-video' : ''}`;
        
        card.onclick = () => {
            document.getElementById('lightbox').style.display = 'flex';
            document.getElementById('viewer').innerHTML = `
                <div class="close-btn" onclick="document.getElementById('lightbox').style.display='none'">CLOSE [X]</div>
                <iframe src="${url}"></iframe>
            `;
        };

        card.innerHTML = `
            <div class="preview-box"><img src="${thumb}"></div>
            <div style="padding:8px;">
                <div style="font-size:11px; font-weight:bold; height:34px; overflow:hidden;">${title}</div>
                <div style="font-size:9px; color:${isVid ? 'var(--vid-blue)' : '#666'}; margin-top:5px;">
                    ${isVid ? '▼ VIDEO SOURCE DETECTED' : '■ STATIC ASSET'}
                </div>
            </div>
        `;
        grid.appendChild(card);
    });
    
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

// Watch for search results to appear
const observer = new MutationObserver(() => {
    const check = document.querySelector('.gsc-results-wrapper-visible');
    if (check) {
        document.getElementById('extract-btn').style.display = 'block';
    }
});
observer.observe(document.body, { childList: true, subtree: true });
</script>

</body>
</html>

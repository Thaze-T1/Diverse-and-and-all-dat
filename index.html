    <div id="results">
        </div>

    <script>
        // Simple "Favorite" logic using LocalStorage (No Account Needed)
        function saveToFavorites(url, title) {
            let favs = JSON.parse(localStorage.getItem('myFavs')) || [];
            favs.push({url, title});
            localStorage.setItem('myFavs', JSON.stringify(favs));
            alert('Saved to your local vault, Agent.');
        }
    </script>

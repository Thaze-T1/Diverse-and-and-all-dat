<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOBBY | Deep Scraper</title>
    <style>
        :root { --bg: #050505; --card: #111; --accent: #00ff41; --text: #ddd; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { text-align: center; letter-spacing: 10px; color: var(--accent); border-bottom: 1px solid var(--accent); padding-bottom: 10px; }
        
        /* Search UI */
        .search-area { background: var(--card); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #222; }
        #extract-btn { background: var(--accent); color: #000; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 4px; display: none; margin-top: 10px; }
        
        /* Grid */
        #results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .media-card { background: var(--card); border: 1px solid #333; border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; transition: 0.2s; }
        .media-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        
        .preview-box { width: 100%; aspect-ratio: 4/3; background: #000; position: relative; overflow: hidden; }
        .preview-box img, .preview-box video { width: 100%; height: 100%; object-fit: cover; }
        
        .info-box { padding: 12px; flex-grow: 1; }
        .info-box strong { font-size: 14px; display: block; margin-bottom: 10px; color: #fff; }
        .source-tag { font-size: 10px; background: #222; padding: 3px 6px; border-radius: 3px; color: var(--accent); }
        .access-btn { display: block; text-align: center; background: #333; color: white; text-decoration: none; padding: 8px; margin-top: 10px; font-size: 12px; border-radius: 4px; }
        .access-btn:hover { background: var(--accent); color: black; }
    </style>
</head>
<body>

<div class="container">
    <h1>THE LOBBY</h1>
    
    <div class="search-area">
        <script async src="https://cse.google.com/cse.js?cx=25f8990bec5e845a4"></script>
        <div class="gcse-search"></div>
        <button id="extract-btn" onclick="runExtraction()">EXTRACT MEDIA FROM TARGETS</button>
    </div>

    <div id="results-grid"></div>
</div>

<script>
// Cleans Google's redirect links
function getDirectUrl(url) {
    try {
        const u = new URL(url);
        return u.searchParams.get('q') || url;
    } catch { return url; }
}

async function runExtraction() {
    const items = document.querySelectorAll('.gsc-webResult');
    const grid = document.getElementById('results-grid');
    grid.innerHTML = ''; // Clear Lobby

    items.forEach(item => {
        const title = item.querySelector('a.gs-title').textContent;
        const rawUrl = item.querySelector('a.gs-title').href;
        const url = getDirectUrl(rawUrl);
        const domain = new URL(url).hostname;
        
        // Find the thumbnail Google already found
        const googleThumb = item.querySelector('img.gs-image')?.src;
        
        let mediaHTML = '';

        // If it's a direct video link (mp4, webm)
        if (url.match(/\.(mp4|webm|ogg)$/)) {
            mediaHTML = `<video src="${url}" controls></video>`;
        } 
        // If we have a thumbnail from the site (like GameBanana previews)
        else if (googleThumb) {
            mediaHTML = `<img src="${googleThumb}" loading="lazy">`;
        }
        // Generic Icon if no media found
        else {
            mediaHTML = `<div style="height:100%; display:flex; align-items:center; justify-content:center; color:#444;">NO PREVIEW</div>`;
        }

        const card = document.createElement('div');
        card.className = 'media-card';
        card.innerHTML = `
            <div class="preview-box">${mediaHTML}</div>
            <div class="info-box">
                <span class="source-tag">${domain}</span>
                <strong>${title}</strong>
                <a href="${url}" target="_blank" class="access-btn">GO TO TARGET PAGE</a>
            </div>
        `;
        grid.appendChild(card);
    });
}

// Watch for Google results
const observer = new MutationObserver(() => {
    if (document.querySelector('.gsc-results-wrapper-visible')) {
        document.getElementById('extract-btn').style.display = 'block';
    }
});
observer.observe(document.body, { childList: true, subtree: true });
</script>

</body>
</html>

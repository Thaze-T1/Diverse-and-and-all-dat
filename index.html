<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOBBY | Universal Content Hub</title>
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --accent: #00ff41; --text: #eee; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        h1 { letter-spacing: 5px; color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Search Bar Styling */
        .search-box { background: var(--card); padding: 20px; border-radius: 10px; border: 1px solid var(--accent); margin-bottom: 30px; }
        
        /* Results Grid */
        #results-area { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .media-card { background: var(--card); border: 1px solid #333; border-radius: 8px; overflow: hidden; padding: 15px; transition: 0.3s; }
        .media-card:hover { border-color: var(--accent); }
        
        /* The Player Frame */
        .player-container { width: 100%; aspect-ratio: 16/9; background: #000; margin-bottom: 10px; border-radius: 5px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .source-link { color: var(--accent); text-decoration: none; font-size: 0.8em; display: block; margin-top: 10px; border-top: 1px solid #333; padding-top: 5px; }
        .source-link:hover { text-underline-offset: 3px; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>THE LOBBY</h1>
        <p>SECURE ACCESS POINT: INTERNET AGGREGATOR</p>
    </header>

    <div class="search-box">
        <script async src="https://cse.google.com/cse.js?cx=25f8990bec5e845a4"></script>
        <div class="gcse-search"></div>
    </div>

    <div id="results-area">
        </div>
</div>

<script>
/** * MEDIA SNIFFER LOGIC
 * This script waits for Google to load results, then converts links into players.
 */
function sniffMedia() {
    const searchItems = document.querySelectorAll('.gsc-result');
    
    searchItems.forEach(item => {
        const linkElement = item.querySelector('a.gs-title');
        if (!linkElement) return;

        const url = linkElement.href;
        const title = linkElement.textContent;
        
        // Create our custom card
        const card = document.createElement('div');
        card.className = 'media-card';
        
        let playerHTML = '';

        // DETECTOR 1: YouTube
        if (url.includes('youtube.com/watch')) {
            const videoId = url.split('v=')[1]?.split('&')[0];
            playerHTML = `<div class="player-container"><iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe></div>`;
        } 
        // DETECTOR 2: Reddit (Simplified Video Embed)
        else if (url.includes('reddit.com')) {
            playerHTML = `<div class="player-container"><iframe src="${url.replace('reddit.com', 'embed.reddit.com')}" sandbox="allow-scripts allow-same-origin"></iframe></div>`;
        }
        // DETECTOR 3: General Images
        else if (url.match(/\.(jpeg|jpg|gif|png)$/) != null) {
            playerHTML = `<div class="player-container"><img src="${url}" style="width:100%; height:100%; object-fit:contain;"></div>`;
        }
        // FALLBACK: Just show a thumbnail or preview icon
        else {
            playerHTML = `<div class="player-container" style="display:flex; align-items:center; justify-content:center; color:#555;">[NON-VIDEO CONTENT]</div>`;
        }

        card.innerHTML = `
            ${playerHTML}
            <strong>${title}</strong>
            <a href="${url}" target="_blank" class="source-link">EXTRACT TO ORIGINAL HOST →</a>
        `;

        document.getElementById('results-area').appendChild(card);
        // Hide the original ugly Google result
        item.style.display = 'none';
    });
}

// Watch the page for when Google finishes loading results
const observer = new MutationObserver((mutations) => {
    if (document.querySelector('.gsc-results-wrapper-visible')) {
        sniffMedia();
    }
});

observer.observe(document.body, { childList: true, subtree: true });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOBBY | Terminal</title>
    <style>
        :root { --bg: #050505; --card: #111; --accent: #00ff41; --vid-blue: #00d4ff; --text: #ddd; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        
        /* THE HUB CONTAINER */
        .hub-interface { max-width: 1200px; margin: 0 auto; }
        
        /* HIDE GOOGLE MESS */
        .gsc-results-wrapper-visible, .gsc-adBlock { display: none !important; }
        .gsc-control-cse { background: transparent !important; border: none !important; padding: 0 !important; }

        .header-box { text-align: center; border-bottom: 1px solid #222; margin-bottom: 20px; padding-bottom: 10px; }
        .header-box h1 { letter-spacing: 12px; margin: 0; color: var(--accent); }

        .search-sector { background: var(--card); padding: 15px; border: 1px solid #333; border-radius: 4px; position: sticky; top: 10px; z-index: 1000; }
        #sync-btn { background: var(--accent); color: #000; border: none; padding: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; display: none; }

        /* THE SINGULAR GRID */
        #main-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        
        .card { background: #151515; border: 1px solid #333; border-radius: 4px; overflow: hidden; cursor: pointer; transition: 0.2s; position: relative; }
        .card:hover { border-color: white; transform: translateY(-3px); }
        .video-target { border: 2px solid var(--vid-blue) !important; }

        .thumb { width: 100%; aspect-ratio: 16/9; background: #000; object-fit: cover; border-bottom: 1px solid #333; }
        .meta { padding: 12px; font-size: 12px; }
        .meta strong { display: block; height: 32px; overflow: hidden; margin-bottom: 5px; }

        /* OVERLAY VIEWER */
        #viewer-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 99999; justify-content: center; align-items: center; flex-direction: column; }
        .viewer-box { width: 90%; height: 80%; background: #000; border: 1px solid var(--accent); position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: white; }
        .exit-hint { margin-top: 15px; color: #555; font-size: 11px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="hub-interface">
    <div class="header-box">
        <h1>THE LOBBY</h1>
    </div>

    <div class="search-sector">
        <script async src="https://cse.google.com/cse.js?cx=25f8990bec5e845a4"></script>
        <div class="gcse-search"></div>
        <button id="sync-btn" onclick="syncGrid()">RE-SYNC GRID</button>
    </div>

    <div id="main-grid">
        <p style="text-align:center; color:#333; grid-column: 1/-1; margin-top: 50px;">NO ACTIVE CONNECTION. INITIATE SEARCH.</p>
    </div>
</div>

<div id="viewer-overlay" onclick="closeViewer()">
    <div class="viewer-box" id="viewer-load" onclick="event.stopPropagation()"></div>
    <div class="exit-hint">CLICK BACKGROUND TO DISCONNECT</div>
</div>

<script>
function syncGrid() {
    const results = document.querySelectorAll('.gsc-webResult');
    const grid = document.getElementById('main-grid');
    
    if (results.length === 0) return;
    grid.innerHTML = ''; 

    results.forEach(res => {
        const anchor = res.querySelector('a.gs-title');
        const title = anchor?.innerText;
        const url = anchor?.href;
        const thumb = res.querySelector('img.gs-image')?.src || '';
        
        if (!url) return;

        const isMedia = url.includes('watch') || url.includes('video') || url.includes('mugen') || url.includes('view') || url.includes('clip');

        const card = document.createElement('div');
        card.className = `card ${isMedia ? 'video-target' : ''}`;
        card.onclick = () => {
            const viewer = document.getElementById('viewer-load');
            document.getElementById('viewer-overlay').style.display = 'flex';
            
            // YOUTUBE CLEANER
            if (url.includes('youtube.com')) {
                const id = url.split('v=')[1]?.split('&')[0];
                viewer.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allowfullscreen></iframe>`;
            } else {
                viewer.innerHTML = `<iframe src="${url}"></iframe>`;
            }
        };

        card.innerHTML = `
            <img src="${thumb || 'https://via.placeholder.com/300x160?text=NO+THUMB'}" class="thumb">
            <div class="meta">
                <strong>${title}</strong>
                <span style="color:${isMedia ? 'var(--vid-blue)' : '#555'}">${isMedia ? '● MEDIA DETECTED' : '○ STATIC PAGE'}</span>
            </div>
        `;
        grid.appendChild(card);
    });
}

function closeViewer() {
    document.getElementById('viewer-overlay').style.display = 'none';
    document.getElementById('viewer-load').innerHTML = '';
}

// Auto-Sync Logic
const observer = new MutationObserver(() => {
    if (document.querySelector('.gsc-results-wrapper-visible')) {
        document.getElementById('sync-btn').style.display = 'block';
        syncGrid(); // Auto-update the grid whenever Google loads
    }
});
observer.observe(document.body, { childList: true, subtree: true });
</script>

</body>
</html>
